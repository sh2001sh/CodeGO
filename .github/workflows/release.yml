name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  release:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-2022
          - os: windows-11-arm
            arch: arm64
          - os: ubuntu-22.04
          - os: ubuntu-22.04-arm
            arch: arm64
          - os: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add Windows ARM64 target
        if: runner.os == 'Windows' && matrix.arch == 'arm64'
        shell: pwsh
        run: rustup target add aarch64-pc-windows-msvc

      - name: Add macOS targets
        if: runner.os == 'macOS'
        run: |
          rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Install Linux system deps
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euxo pipefail
          sudo apt-get update
          # Core build tools and pkg-config
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            pkg-config \
            curl \
            wget \
            file \
            patchelf \
            libssl-dev \
            rpm \
            flatpak \
            flatpak-builder \
            elfutils \
            xdg-utils
          # GTK/GLib stack for gdk-3.0, glib-2.0, gio-2.0
          sudo apt-get install -y --no-install-recommends \
            libgtk-3-dev \
            librsvg2-dev \
            libayatana-appindicator3-dev
          # WebKit2GTK (version differs across Ubuntu images; try 4.1 then 4.0)
          sudo apt-get install -y --no-install-recommends libwebkit2gtk-4.1-dev \
            || sudo apt-get install -y --no-install-recommends libwebkit2gtk-4.0-dev
          # libsoup also changed major version; prefer 3.0 with fallback to 2.4
          sudo apt-get install -y --no-install-recommends libsoup-3.0-dev \
            || sudo apt-get install -y --no-install-recommends libsoup2.4-dev

      - name: Setup pnpm
        if: runner.os != 'Windows' || matrix.arch != 'arm64'
        uses: pnpm/action-setup@v6
        with:
          version: 10.12.3
          run_install: false

      - name: Setup pnpm (Windows ARM64)
        if: runner.os == 'Windows' && matrix.arch == 'arm64'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          corepack enable
          corepack prepare pnpm@10.12.3 --activate
          node --version
          pnpm --version

      - name: Get pnpm store directory
        if: runner.os != 'Windows' || matrix.arch != 'arm64'
        id: pnpm-store
        shell: bash
        run: echo "path=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        if: runner.os != 'Windows' || matrix.arch != 'arm64'
        uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-${{ runner.arch }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-${{ runner.arch }}-pnpm-store-

      - name: Setup LLVM for Windows ARM64
        if: runner.os == 'Windows' && matrix.arch == 'arm64'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $llvmRoot = 'C:\Program Files\LLVM'
          if (-not (Test-Path $llvmRoot)) {
            throw "LLVM not found at $llvmRoot"
          }
          $llvmBin = Join-Path $llvmRoot 'bin'
          "LIBCLANG_PATH=$llvmBin" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "CLANG_PATH=$(Join-Path $llvmBin 'clang.exe')" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          $llvmBin | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: Clean stale release artifacts
        shell: bash
        run: node scripts/clean-codego-release-artifacts.mjs

      - name: Resolve signing configuration
        id: signing-config
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail

          if [ -n "${TAURI_SIGNING_PRIVATE_KEY:-}" ]; then
            echo "tauri_signing_enabled=true" >> "$GITHUB_OUTPUT"
            echo "Tauri updater signing is enabled for this runner."
          else
            echo "tauri_signing_enabled=false" >> "$GITHUB_OUTPUT"
            echo "Tauri updater signing secret is missing; unsigned release artifacts will be published."
          fi

          if [ "${RUNNER_OS}" != "macOS" ]; then
            echo "apple_signing_enabled=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          missing=()
          for key in \
            APPLE_CERTIFICATE \
            APPLE_CERTIFICATE_PASSWORD \
            APPLE_ID \
            APPLE_PASSWORD \
            APPLE_TEAM_ID \
            KEYCHAIN_PASSWORD; do
            if [ -z "${!key:-}" ]; then
              missing+=("$key")
            fi
          done

          if [ "${#missing[@]}" -gt 0 ]; then
            echo "apple_signing_enabled=false" >> "$GITHUB_OUTPUT"
            echo "Apple signing/notarization secrets are missing: ${missing[*]}"
          else
            echo "apple_signing_enabled=true" >> "$GITHUB_OUTPUT"
            echo "Apple signing and notarization are enabled for this runner."
          fi

      - name: Prepare Tauri signing key
        id: tauri-signing-key
        if: steps.signing-config.outputs.tauri_signing_enabled == 'true'
        shell: bash
        run: |
          RAW="${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}"
          # 目标：提供正确的私钥“文件路径”给 Tauri CLI，避免内容解码歧义
          KEY_PATH="$RUNNER_TEMP/tauri_signing.key"
          # 情况 1：原始两行文本（第一行以 "untrusted comment:" 开头）
          if echo "$RAW" | head -n1 | grep -q '^untrusted comment:'; then
            printf '%s\n' "$RAW" > "$KEY_PATH"
            echo "✅ 使用原始两行密钥文件格式"
          else
            # 情况 2：整体被 base64 包裹（解包后应当是两行）
            if DECODED=$(printf '%s' "$RAW" | (base64 --decode 2>/dev/null || base64 -D 2>/dev/null)) \
               && echo "$DECODED" | head -n1 | grep -q '^untrusted comment:'; then
              printf '%s\n' "$DECODED" > "$KEY_PATH"
              echo "✅ 成功解码 base64 包裹密钥，已还原为两行文件"
            else
              # 情况 3：已是第二行（纯 Base64 一行）→ 构造两行文件
              if echo "$RAW" | grep -Eq '^[A-Za-z0-9+/=]+$'; then
                ONE=$(printf '%s' "$RAW" | tr -d '\r\n')
                printf '%s\n%s\n' "untrusted comment: tauri signing key" "$ONE" > "$KEY_PATH"
                echo "✅ 使用一行 Base64 私钥，已构造两行文件"
              else
                echo "❌ TAURI_SIGNING_PRIVATE_KEY 格式无法识别：既不是两行原文，也不是其 base64，亦非一行 base64" >&2
                echo "密钥前10个字符: $(echo "$RAW" | head -c 10)..." >&2
                exit 1
              fi
            fi
          fi
          # 将“完整两行内容”作为环境变量注入（Tauri 支持传入完整私钥文本或文件路径）
          # 使用多行写入语法，保持换行以便解析
          # 将完整两行私钥内容进行 base64 编码，作为单行内容注入环境变量
          if command -v base64 >/dev/null 2>&1; then
            KEY_B64=$(base64 < "$KEY_PATH" | tr -d '\r\n')
          elif command -v openssl >/dev/null 2>&1; then
            KEY_B64=$(openssl base64 -A -in "$KEY_PATH")
          else
            KEY_B64=$(KEY_PATH="$KEY_PATH" node -e "process.stdout.write(require('fs').readFileSync(process.env.KEY_PATH).toString('base64'))")
          fi
          if [ -z "$KEY_B64" ]; then
            echo "❌ 无法生成私钥 base64 内容" >&2
            exit 1
          fi
          echo "TAURI_SIGNING_PRIVATE_KEY=$KEY_B64" >> "$GITHUB_ENV"
          if [ -n "${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}" ]; then
            echo "TAURI_SIGNING_PRIVATE_KEY_PASSWORD=${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}" >> $GITHUB_ENV
          fi
          echo "✅ Tauri signing key prepared"

      - name: Prepare unsigned Tauri build override
        if: steps.signing-config.outputs.tauri_signing_enabled != 'true'
        shell: bash
        run: |
          set -euo pipefail
          CONFIG_PATH="$RUNNER_TEMP/tauri.release.override.json"
          cat > "$CONFIG_PATH" <<'EOF'
          {
            "bundle": {
              "createUpdaterArtifacts": false,
              "macOS": {
                "signingIdentity": "-"
              }
            }
          }
          EOF
          echo "TAURI_BUILD_CONFIG_PATH=$CONFIG_PATH" >> "$GITHUB_ENV"
          echo "Updater signing is disabled; tauri build will skip updater artifact generation and use ad-hoc macOS signing."

      - name: Import Apple signing certificate
        if: runner.os == 'macOS' && steps.signing-config.outputs.apple_signing_enabled == 'true'
        shell: bash
        run: |
          set -euo pipefail
          # Decode .p12 certificate from base64
          CERT_PATH="$RUNNER_TEMP/certificate.p12"
          printf '%s' "${{ secrets.APPLE_CERTIFICATE }}" | (base64 --decode 2>/dev/null || base64 -D) > "$CERT_PATH"

          # Save original default keychain for cleanup
          ORIGINAL_DEFAULT_KEYCHAIN=$(security default-keychain -d user | tr -d '"' | xargs)
          echo "ORIGINAL_DEFAULT_KEYCHAIN=$ORIGINAL_DEFAULT_KEYCHAIN" >> "$GITHUB_ENV"

          # Create temporary keychain
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          security create-keychain -p "${{ secrets.KEYCHAIN_PASSWORD }}" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"
          security unlock-keychain -p "${{ secrets.KEYCHAIN_PASSWORD }}" "$KEYCHAIN_PATH"

          # Import certificate
          security import "$CERT_PATH" \
            -k "$KEYCHAIN_PATH" \
            -P "${{ secrets.APPLE_CERTIFICATE_PASSWORD }}" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "${{ secrets.KEYCHAIN_PASSWORD }}" "$KEYCHAIN_PATH"

          # Dynamically resolve signing identity (must be "Developer ID Application")
          IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" \
            | grep "Developer ID Application" | grep -oE '"[^"]+"' | head -1 | tr -d '"')
          if [ -z "$IDENTITY" ]; then
            echo "❌ No 'Developer ID Application' identity found — listing all identities:" >&2
            security find-identity -v -p codesigning "$KEYCHAIN_PATH"
            exit 1
          fi
          echo "✅ Signing identity: $IDENTITY"
          echo "APPLE_SIGNING_IDENTITY=$IDENTITY" >> "$GITHUB_ENV"

          # Cleanup certificate file
          rm -f "$CERT_PATH"

      - name: Build Tauri App (macOS)
        if: runner.os == 'macOS'
        shell: bash
        timeout-minutes: 60
        env:
          APPLE_SIGNING_IDENTITY: ${{ env.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          if [ "${{ steps.signing-config.outputs.apple_signing_enabled }}" != "true" ]; then
            unset APPLE_SIGNING_IDENTITY APPLE_ID APPLE_PASSWORD APPLE_TEAM_ID
            echo "Apple signing is disabled for this run; cleared macOS signing env vars so Tauri can use the unsigned override."
          fi
          max_attempts=3
          for attempt in $(seq 1 "$max_attempts"); do
            echo "=== macOS build/notarization attempt ${attempt}/${max_attempts} ==="
            build_cmd=(pnpm tauri build --target universal-apple-darwin)
            if [ -n "${TAURI_BUILD_CONFIG_PATH:-}" ]; then
              build_cmd+=(--config "$TAURI_BUILD_CONFIG_PATH")
            fi
            if "${build_cmd[@]}"; then
              echo "✅ macOS build/notarization succeeded"
              exit 0
            fi

            if [ "$attempt" -eq "$max_attempts" ]; then
              echo "❌ macOS build/notarization failed after ${max_attempts} attempts" >&2
              exit 1
            fi

            sleep_seconds=$((attempt * 60))
            echo "⚠️ macOS build/notarization failed, retrying in ${sleep_seconds}s..."
            sleep "$sleep_seconds"
          done

      - name: Build Tauri App (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          WINDOWS_RELEASE_ARCH: ${{ matrix.arch || 'x86_64' }}
        run: |
          $ErrorActionPreference = 'Stop'
          $buildArgs = @('exec', 'tauri', 'build')
          if ($env:TAURI_BUILD_CONFIG_PATH) {
            $buildArgs += @('--config', $env:TAURI_BUILD_CONFIG_PATH)
          }
          if ($env:WINDOWS_RELEASE_ARCH -eq 'arm64') {
            $buildArgs += @('--target', 'aarch64-pc-windows-msvc', '--bundles', 'msi')
          } else {
            $buildArgs += @()
          }
          & pnpm @buildArgs

      - name: Build Tauri App (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          build_cmd=(pnpm tauri build --bundles appimage,deb,rpm)
          if [ -n "${TAURI_BUILD_CONFIG_PATH:-}" ]; then
            build_cmd+=(--config "$TAURI_BUILD_CONFIG_PATH")
          fi
          "${build_cmd[@]}"

      - name: Prepare macOS Assets
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p release-assets
          VERSION="${GITHUB_REF_NAME#v}"

          # Locate bundle artifacts
          TAR_GZ=""; APP_PATH=""
          for path in \
            "src-tauri/target/universal-apple-darwin/release/bundle/macos" \
            "src-tauri/target/aarch64-apple-darwin/release/bundle/macos" \
            "src-tauri/target/x86_64-apple-darwin/release/bundle/macos" \
            "src-tauri/target/release/bundle/macos"; do
            if [ -d "$path" ]; then
              [ -z "$TAR_GZ" ]   && TAR_GZ=$(find "$path" -maxdepth 1 -name "*.tar.gz" -type f | head -1 || true)
              [ -z "$APP_PATH" ] && APP_PATH=$(find "$path" -maxdepth 1 -name "*.app" -type d | head -1 || true)
            fi
          done

          if [ -z "$TAR_GZ" ]; then
            echo "❌ No macOS .tar.gz updater artifact found" >&2
            exit 1
          fi
          if [ -z "$APP_PATH" ]; then
            echo "❌ No .app found" >&2
            exit 1
          fi

          if [ "${{ steps.signing-config.outputs.apple_signing_enabled }}" = "true" ]; then
            # Staple notarization ticket to .app (Tauri already notarized it)
            xcrun stapler staple "$APP_PATH"
            echo "✅ .app stapled"
          else
            echo "Apple signing secrets are unavailable; skipping .app stapling."
          fi

          # 1) Collect .tar.gz (updater artifact)
          NEW_TAR_GZ="CodeGo_${VERSION}_universal.app.tar.gz"
          cp "$TAR_GZ" "release-assets/$NEW_TAR_GZ"
          [ -f "$TAR_GZ.sig" ] && cp "$TAR_GZ.sig" "release-assets/$NEW_TAR_GZ.sig" || echo ".sig for macOS not found yet"
          echo "macOS updater artifact copied: $NEW_TAR_GZ"

          # 2) Collect .app as zip
          NEW_ZIP="CodeGo_${VERSION}_universal.zip"
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" "release-assets/$NEW_ZIP"
          echo "macOS zip ready: $NEW_ZIP"

          # 3) Create styled DMG with create-dmg (Tauri's built-in DMG styling doesn't work on CI)
          HOMEBREW_NO_AUTO_UPDATE=1 brew install create-dmg
          NEW_DMG="CodeGo_${VERSION}_universal.dmg"
          DMG_STAGE_DIR="$RUNNER_TEMP/dmg-stage"
          rm -rf "$DMG_STAGE_DIR"
          mkdir -p "$DMG_STAGE_DIR"
          ditto "$APP_PATH" "$DMG_STAGE_DIR/Code Go Desktop.app"

          dmg_args=(
            --volname "Code Go Desktop"
            --background "src-tauri/icons/dmg-background.png"
            --window-size 660 400
            --window-pos 200 120
            --icon-size 80
            --icon "Code Go Desktop.app" 180 220
            --hide-extension "Code Go Desktop.app"
            --app-drop-link 480 220
            --no-internet-enable
          )
          if [ -n "${APPLE_SIGNING_IDENTITY:-}" ]; then
            dmg_args+=(--codesign "$APPLE_SIGNING_IDENTITY")
          else
            echo "APPLE_SIGNING_IDENTITY is unavailable; creating an unsigned DMG."
          fi
          dmg_args+=("release-assets/$NEW_DMG" "$DMG_STAGE_DIR")

          create-dmg "${dmg_args[@]}"

          rm -rf "$DMG_STAGE_DIR"
          echo "✅ Styled DMG created: $NEW_DMG"

      - name: Notarize macOS DMG
        if: runner.os == 'macOS' && steps.signing-config.outputs.apple_signing_enabled == 'true'
        shell: bash
        timeout-minutes: 30
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail

          DMG_PATH=$(find release-assets -maxdepth 1 -name "*.dmg" -type f | head -1 || true)
          if [ -z "$DMG_PATH" ]; then
            echo "❌ No .dmg found in release-assets/ to notarize" >&2
            exit 1
          fi

          echo "=== Notarizing DMG: $DMG_PATH ==="
          max_attempts=3
          for attempt in $(seq 1 "$max_attempts"); do
            echo "=== DMG notarization attempt ${attempt}/${max_attempts} ==="
            if xcrun notarytool submit "$DMG_PATH" \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_PASSWORD" \
              --team-id "$APPLE_TEAM_ID" \
              --wait; then
              echo "✅ DMG notarization succeeded"
              xcrun stapler staple "$DMG_PATH"
              echo "✅ DMG stapled"
              break
            fi

            if [ "$attempt" -eq "$max_attempts" ]; then
              echo "❌ DMG notarization failed after ${max_attempts} attempts" >&2
              exit 1
            fi

            sleep_seconds=$((attempt * 60))
            echo "⚠️ DMG notarization failed, retrying in ${sleep_seconds}s..."
            sleep "$sleep_seconds"
          done

      - name: Verify macOS code signing and notarization
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail

          # Verify .app (from Tauri bundle)
          APP_PATH=""
          for path in \
            "src-tauri/target/universal-apple-darwin/release/bundle/macos" \
            "src-tauri/target/aarch64-apple-darwin/release/bundle/macos" \
            "src-tauri/target/x86_64-apple-darwin/release/bundle/macos" \
            "src-tauri/target/release/bundle/macos"; do
            if [ -d "$path" ]; then
              [ -z "$APP_PATH" ] && APP_PATH=$(find "$path" -maxdepth 1 -name "*.app" -type d | head -1 || true)
            fi
          done

          if [ -z "$APP_PATH" ]; then
            echo "❌ No .app found for verification" >&2
            exit 1
          fi

          # Verify .dmg (from release-assets/, created by create-dmg + notarized)
          DMG_PATH=$(find release-assets -maxdepth 1 -name "*.dmg" -type f | head -1 || true)
          if [ -z "$DMG_PATH" ]; then
            echo "❌ No .dmg found for verification — release would ship without DMG" >&2
            exit 1
          fi

          if [ "${{ steps.signing-config.outputs.apple_signing_enabled }}" = "true" ]; then
            echo "=== Verifying .app: $APP_PATH ==="
            codesign --verify --deep --strict --verbose=2 "$APP_PATH"
            echo "✅ codesign verification passed"
            spctl -a -t exec -vv "$APP_PATH"
            echo "✅ spctl assessment passed"
            xcrun stapler validate "$APP_PATH"
            echo "✅ .app stapler validation passed"

            echo "=== Verifying .dmg: $DMG_PATH ==="
            codesign --verify --verbose=2 "$DMG_PATH"
            echo "✅ .dmg codesign verification passed"
            spctl -a -t open --context context:primary-signature -vv "$DMG_PATH"
            echo "✅ .dmg spctl assessment passed"
            xcrun stapler validate "$DMG_PATH"
            echo "✅ .dmg stapler validation passed"
          else
            echo "Apple signing secrets are unavailable; verified unsigned macOS artifacts exist."
          fi

      - name: Prepare Windows Assets
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          WINDOWS_RELEASE_ARCH: ${{ matrix.arch || 'x86_64' }}
        run: |
          $ErrorActionPreference = 'Stop'
          $updaterSigningEnabled = '${{ steps.signing-config.outputs.tauri_signing_enabled }}' -eq 'true'
          New-Item -ItemType Directory -Force -Path release-assets | Out-Null
          $VERSION = $env:GITHUB_REF_NAME -replace '^v', ''
          $isArm64 = $env:WINDOWS_RELEASE_ARCH -eq 'arm64'
          $targetRoot = if ($isArm64) { 'src-tauri/target/aarch64-pc-windows-msvc/release' } else { 'src-tauri/target/release' }
          $assetArch = if ($isArm64) { 'arm64' } else { 'x64' }

          # 仅打包 MSI 安装器 + .sig（用于 Updater）
          $msi = Get-ChildItem -Path (Join-Path $targetRoot 'bundle/msi') -Recurse -Include *.msi -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($null -eq $msi) {
            # 兜底：全局搜索 .msi
            $msi = Get-ChildItem -Path (Join-Path $targetRoot 'bundle') -Recurse -Include *.msi -ErrorAction SilentlyContinue | Select-Object -First 1
          }
          if ($null -ne $msi) {
            $dest = "CodeGo_${VERSION}_${assetArch}_en-US.msi"
            Copy-Item $msi.FullName (Join-Path release-assets $dest)
            Write-Host "Installer copied: $dest"
            $sigPath = "$($msi.FullName).sig"
            if (Test-Path $sigPath) {
              Copy-Item $sigPath (Join-Path release-assets ("$dest.sig"))
              Write-Host "Signature copied: $dest.sig"
            } elseif ($updaterSigningEnabled) {
              throw "Signature not found for $($msi.Name)"
            } else {
              Write-Warning "Signature not found for $($msi.Name)"
            }
          } elseif ($isArm64) {
            throw 'No Windows ARM64 MSI installer found'
          } else {
            Write-Warning 'No Windows MSI installer found'
          }

          # 绿色版（portable）：仅可执行文件打 zip（不参与 Updater）
          $exeCandidates = if ($isArm64) {
            @(
              'src-tauri/target/aarch64-pc-windows-msvc/release/codego.exe',
              'src-tauri/target/aarch64-pc-windows-msvc/release/cc-switch.exe'
            )
          } else {
            @(
              'src-tauri/target/release/codego.exe',
              'src-tauri/target/release/cc-switch.exe',
              'src-tauri/target/x86_64-pc-windows-msvc/release/codego.exe',
              'src-tauri/target/x86_64-pc-windows-msvc/release/cc-switch.exe'
            )
          }
          $exePath = $exeCandidates | Where-Object { Test-Path $_ } | Select-Object -First 1
          if ($null -ne $exePath) {
            $portableDir = 'release-assets/CodeGo_Portable'
            New-Item -ItemType Directory -Force -Path $portableDir | Out-Null
            Copy-Item $exePath $portableDir
            $portableIniPath = Join-Path $portableDir 'portable.ini'
            $portableContent = if ($isArm64) {
              @(
                '# Code Go Desktop portable ARM64 build marker',
                'portable=true',
                'arch=arm64'
              )
            } else {
              @(
                '# Code Go Desktop portable build marker',
                'portable=true'
              )
            }
            $portableContent | Set-Content -Path $portableIniPath -Encoding UTF8
            $portableZip = "release-assets/CodeGo_${VERSION}_${assetArch}_portable.zip"
            Compress-Archive -Path "$portableDir/*" -DestinationPath $portableZip -Force
            Remove-Item -Recurse -Force $portableDir
            Write-Host "Windows portable zip created: CodeGo_${VERSION}_${assetArch}_portable.zip"
          } elseif ($isArm64) {
            throw 'Portable ARM64 exe not found'
          } else {
            Write-Warning 'Portable exe not found'
          }

      - name: Prepare Linux Assets
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p release-assets
          VERSION="${GITHUB_REF_NAME#v}"
          ARCH="${{ matrix.arch || 'x86_64' }}"
          if [ "$ARCH" = "x86_64" ]; then
            ASSET_ARCH="x64"
          elif [ "$ARCH" = "aarch64" ]; then
            ASSET_ARCH="arm64"
          else
            ASSET_ARCH="$ARCH"
          fi
          # Updater artifact: AppImage（含对应 .sig）
          APPIMAGE=$(find src-tauri/target/release/bundle -name "*.AppImage" | head -1 || true)
          if [ -n "$APPIMAGE" ]; then
            NEW_APPIMAGE="CodeGo_${VERSION}_${ASSET_ARCH}.AppImage"
            cp "$APPIMAGE" "release-assets/$NEW_APPIMAGE"
            [ -f "$APPIMAGE.sig" ] && cp "$APPIMAGE.sig" "release-assets/$NEW_APPIMAGE.sig" || echo ".sig for AppImage not found"
            echo "AppImage copied: $NEW_APPIMAGE"
          else
            echo "No AppImage found under target/release/bundle" >&2
          fi
          # 额外上传 .deb（用于手动安装，不参与 Updater）
          DEB=$(find src-tauri/target/release/bundle -name "*.deb" | head -1 || true)
          if [ -n "$DEB" ]; then
            cp "$DEB" "release-assets/CodeGo_${VERSION}_${ASSET_ARCH}.deb"
            echo "Deb package copied: CodeGo_${VERSION}_${ASSET_ARCH}.deb"
          else
            echo "No .deb found (optional)"
          fi
          # 额外上传 .rpm（用于 Fedora/RHEL/openSUSE 等，不参与 Updater）
          RPM=$(find src-tauri/target/release/bundle -name "*.rpm" | head -1 || true)
          if [ -n "$RPM" ]; then
            cp "$RPM" "release-assets/CodeGo_${VERSION}_${ASSET_ARCH}.rpm"
            echo "RPM package copied: CodeGo_${VERSION}_${ASSET_ARCH}.rpm"
          else
            echo "No .rpm found (optional)"
          fi

      - name: List prepared assets
        shell: bash
        run: |
          ls -la release-assets || true

      - name: Collect Signatures
        shell: bash
        run: |
          set -euo pipefail
          echo "Collected signatures (if any alongside artifacts):"
          ls -la release-assets/*.sig || echo "No signatures found"

      - name: Upload release artifacts to workflow
        uses: actions/upload-artifact@v7
        with:
          name: release-assets-${{ runner.os }}-${{ matrix.arch || runner.arch }}
          path: release-assets/*
          if-no-files-found: error

      - name: List generated bundles (debug)
        if: always()
        shell: bash
        run: |
          echo "Listing bundles in src-tauri/target..."
          find src-tauri/target -maxdepth 4 -type f -name "*.*" 2>/dev/null || true

      - name: Clean up Apple signing keychain
        if: runner.os == 'macOS' && always()
        shell: bash
        run: |
          if [ -n "${ORIGINAL_DEFAULT_KEYCHAIN:-}" ]; then
            security default-keychain -s "$ORIGINAL_DEFAULT_KEYCHAIN" || true
          fi
          if [ -f "$RUNNER_TEMP/build.keychain-db" ]; then
            security delete-keychain "$RUNNER_TEMP/build.keychain-db" || true
          fi

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-22.04
    needs: release
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Download built release artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: release-assets-*
          path: release-assets
          merge-multiple: true

      - name: List downloaded release artifacts
        shell: bash
        run: |
          set -euo pipefail
          ls -la release-assets

      - name: Generate release manifests
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          node scripts/build-codego-release-manifest.mjs \
            --assets-dir "release-assets" \
            --download-base-url "/downloads/codego" \
            --version "$VERSION" \
            --tag "$GITHUB_REF_NAME" \
            --published-at "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --notes "Code Go Desktop ${GITHUB_REF_NAME}" \
            --release-page-url "/download?version=${GITHUB_REF_NAME}" \
            --homebrew-url "https://brew.sh/" \
            --manifest-out "release-assets/codego-desktop-release-manifest.json" \
            --latest-out "release-assets/latest.json"

      - name: Resolve release verification requirements
        id: release-metadata
        shell: bash
        run: |
          set -euo pipefail
          node <<'EOF'
          const fs = require("node:fs");

          const manifest = JSON.parse(
            fs.readFileSync("release-assets/codego-desktop-release-manifest.json", "utf8"),
          );
          const latest = JSON.parse(
            fs.readFileSync("release-assets/latest.json", "utf8"),
          );

          const requiredPlatforms = Object.keys(latest.platforms || {}).join(",");
          const requiredAssetSuffixes = (Array.isArray(manifest.assets) ? manifest.assets : [])
            .map((asset) => String(asset?.name || "").trim())
            .filter(Boolean)
            .join(",");

          fs.appendFileSync(
            process.env.GITHUB_OUTPUT,
            `required_platforms=${requiredPlatforms}\n`,
          );
          fs.appendFileSync(
            process.env.GITHUB_OUTPUT,
            `required_asset_suffixes=${requiredAssetSuffixes}\n`,
          );
          fs.appendFileSync(
            process.env.GITHUB_OUTPUT,
            `updater_signatures_present=${requiredPlatforms ? "true" : "false"}\n`,
          );
          EOF

      - name: Build deploy bundle
        shell: bash
        run: |
          set -euo pipefail
          node scripts/build-codego-release-deploy-bundle.mjs \
            --assets-dir "release-assets" \
            --manifest "release-assets/codego-desktop-release-manifest.json" \
            --latest "release-assets/latest.json" \
            --bundle-out "release-assets/deploy-bundle"

      - name: Verify local release bundle
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          node scripts/verify-codego-release-bundle.mjs \
            --assets-dir "release-assets" \
            --manifest "release-assets/codego-desktop-release-manifest.json" \
            --latest "release-assets/latest.json" \
            --bundle-out "release-assets/deploy-bundle" \
            --expected-version "$VERSION" \
            --required-platforms "${{ steps.release-metadata.outputs.required_platforms }}" \
            --required-asset-suffixes "${{ steps.release-metadata.outputs.required_asset_suffixes }}"

      - name: Generate release acceptance template
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          node scripts/build-codego-release-acceptance-template.mjs \
            --manifest "release-assets/codego-desktop-release-manifest.json" \
            --latest "release-assets/latest.json" \
            --template-out "release-assets/acceptance/codego-release-acceptance-record.json" \
            --checklist-out "release-assets/acceptance/codego-release-acceptance-checklist.md" \
            --expected-version "$VERSION"

      - name: Verify generated acceptance template
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          node scripts/verify-codego-release-acceptance-record.mjs \
            --manifest "release-assets/codego-desktop-release-manifest.json" \
            --latest "release-assets/latest.json" \
            --record "release-assets/acceptance/codego-release-acceptance-record.json" \
            --expected-version "$VERSION"

      - name: Upload deploy bundle to workflow
        uses: actions/upload-artifact@v7
        with:
          name: codego-release-deploy-bundle-${{ github.ref_name }}
          path: release-assets/deploy-bundle/**
          if-no-files-found: error

      - name: Upload acceptance template to workflow
        uses: actions/upload-artifact@v7
        with:
          name: codego-release-acceptance-template-${{ github.ref_name }}
          path: release-assets/acceptance/**
          if-no-files-found: error

      - name: Resolve self-hosted deploy configuration
        id: deploy-config
        shell: bash
        env:
          CODEGO_RELEASE_DEPLOY_HOST: ${{ secrets.CODEGO_RELEASE_DEPLOY_HOST }}
          CODEGO_RELEASE_DEPLOY_USER: ${{ secrets.CODEGO_RELEASE_DEPLOY_USER }}
          CODEGO_RELEASE_DEPLOY_SSH_KEY: ${{ secrets.CODEGO_RELEASE_DEPLOY_SSH_KEY }}
          CODEGO_RELEASE_STATIC_DIR: ${{ secrets.CODEGO_RELEASE_STATIC_DIR }}
          CODEGO_RELEASE_MANIFEST_FILE: ${{ secrets.CODEGO_RELEASE_MANIFEST_FILE }}
        run: |
          set -euo pipefail
          missing=()
          for key in \
            CODEGO_RELEASE_DEPLOY_HOST \
            CODEGO_RELEASE_DEPLOY_USER \
            CODEGO_RELEASE_DEPLOY_SSH_KEY \
            CODEGO_RELEASE_STATIC_DIR \
            CODEGO_RELEASE_MANIFEST_FILE; do
            if [ -z "${!key:-}" ]; then
              missing+=("$key")
            fi
          done

          if [ "${#missing[@]}" -gt 0 ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "summary=Skipping remote deploy because required secrets are missing: ${missing[*]}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "enabled=true" >> "$GITHUB_OUTPUT"
          echo "summary=Remote deploy is configured for this release." >> "$GITHUB_OUTPUT"

      - name: Prepare deployment SSH key
        if: steps.deploy-config.outputs.enabled == 'true'
        shell: bash
        env:
          CODEGO_RELEASE_DEPLOY_HOST: ${{ secrets.CODEGO_RELEASE_DEPLOY_HOST }}
          CODEGO_RELEASE_DEPLOY_PORT: ${{ secrets.CODEGO_RELEASE_DEPLOY_PORT }}
          CODEGO_RELEASE_DEPLOY_SSH_KEY: ${{ secrets.CODEGO_RELEASE_DEPLOY_SSH_KEY }}
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.ssh"
          printf '%s\n' "$CODEGO_RELEASE_DEPLOY_SSH_KEY" > "$HOME/.ssh/codego_release"
          chmod 600 "$HOME/.ssh/codego_release"
          touch "$HOME/.ssh/known_hosts"
          ssh-keyscan -p "${CODEGO_RELEASE_DEPLOY_PORT:-22}" -H "$CODEGO_RELEASE_DEPLOY_HOST" >> "$HOME/.ssh/known_hosts"

      - name: Deploy self-hosted release channel
        if: steps.deploy-config.outputs.enabled == 'true'
        shell: bash
        env:
          CODEGO_RELEASE_DEPLOY_HOST: ${{ secrets.CODEGO_RELEASE_DEPLOY_HOST }}
          CODEGO_RELEASE_DEPLOY_PORT: ${{ secrets.CODEGO_RELEASE_DEPLOY_PORT }}
          CODEGO_RELEASE_DEPLOY_USER: ${{ secrets.CODEGO_RELEASE_DEPLOY_USER }}
          CODEGO_RELEASE_STATIC_DIR: ${{ secrets.CODEGO_RELEASE_STATIC_DIR }}
          CODEGO_RELEASE_METADATA_DIR: ${{ secrets.CODEGO_RELEASE_METADATA_DIR }}
          CODEGO_RELEASE_MANIFEST_FILE: ${{ secrets.CODEGO_RELEASE_MANIFEST_FILE }}
          CODEGO_RELEASE_REMOTE_TMP_DIR: ${{ secrets.CODEGO_RELEASE_REMOTE_TMP_DIR }}
        run: |
          set -euo pipefail
          port="${CODEGO_RELEASE_DEPLOY_PORT:-22}"
          bundle_dir="release-assets/deploy-bundle"
          static_dir="$CODEGO_RELEASE_STATIC_DIR"
          metadata_dir="${CODEGO_RELEASE_METADATA_DIR:-$CODEGO_RELEASE_STATIC_DIR}"
          remote_tmp="${CODEGO_RELEASE_REMOTE_TMP_DIR:-/tmp/codego-release-${GITHUB_REF_NAME}}"
          ssh_target="${CODEGO_RELEASE_DEPLOY_USER}@${CODEGO_RELEASE_DEPLOY_HOST}"
          ssh_key="$HOME/.ssh/codego_release"

          [ -d "$bundle_dir" ] || { echo "Missing deploy bundle at $bundle_dir" >&2; exit 1; }

          printf -v q_remote_tmp '%q' "$remote_tmp"
          printf -v q_static_dir '%q' "$static_dir"
          printf -v q_metadata_dir '%q' "$metadata_dir"
          printf -v q_manifest_file '%q' "$CODEGO_RELEASE_MANIFEST_FILE"

          tar -C "$bundle_dir" -czf - . | ssh -i "$ssh_key" -p "$port" "$ssh_target" "rm -rf $q_remote_tmp && mkdir -p $q_remote_tmp && tar -xzf - -C $q_remote_tmp"

          ssh -i "$ssh_key" -p "$port" "$ssh_target" \
            "REMOTE_TMP=$q_remote_tmp STATIC_DIR=$q_static_dir METADATA_DIR=$q_metadata_dir MANIFEST_FILE=$q_manifest_file bash -s" <<'EOF'
          set -euo pipefail
          mkdir -p "$STATIC_DIR" "$METADATA_DIR" "$(dirname "$MANIFEST_FILE")"
          find "$REMOTE_TMP/static/downloads/codego" -maxdepth 1 -type f -exec cp -f "{}" "$STATIC_DIR"/ \;
          install -m 0644 "$REMOTE_TMP/runtime/codego-desktop-release-manifest.json" "$MANIFEST_FILE"
          install -m 0644 "$REMOTE_TMP/metadata/release-metadata/codego/latest.json" "$METADATA_DIR/latest.json"
          install -m 0644 "$REMOTE_TMP/metadata/release-metadata/codego/codego-desktop-release-manifest.json" "$METADATA_DIR/codego-desktop-release-manifest.json"
          rm -rf "$REMOTE_TMP"
          EOF

      - name: Reload release consumers
        if: steps.deploy-config.outputs.enabled == 'true' && env.CODEGO_RELEASE_POST_DEPLOY_RELOAD_COMMAND != ''
        shell: bash
        env:
          CODEGO_RELEASE_DEPLOY_HOST: ${{ secrets.CODEGO_RELEASE_DEPLOY_HOST }}
          CODEGO_RELEASE_DEPLOY_PORT: ${{ secrets.CODEGO_RELEASE_DEPLOY_PORT }}
          CODEGO_RELEASE_DEPLOY_USER: ${{ secrets.CODEGO_RELEASE_DEPLOY_USER }}
          CODEGO_RELEASE_POST_DEPLOY_RELOAD_COMMAND: ${{ secrets.CODEGO_RELEASE_POST_DEPLOY_RELOAD_COMMAND }}
        run: |
          set -euo pipefail
          port="${CODEGO_RELEASE_DEPLOY_PORT:-22}"
          ssh_target="${CODEGO_RELEASE_DEPLOY_USER}@${CODEGO_RELEASE_DEPLOY_HOST}"
          ssh_key="$HOME/.ssh/codego_release"
          ssh -i "$ssh_key" -p "$port" "$ssh_target" "$CODEGO_RELEASE_POST_DEPLOY_RELOAD_COMMAND"

      - name: Smoke test self-hosted release channel
        if: steps.deploy-config.outputs.enabled == 'true'
        shell: bash
        env:
          CODEGO_RELEASE_PUBLIC_BASE_URL: ${{ secrets.CODEGO_RELEASE_PUBLIC_BASE_URL }}
        run: |
          set -euo pipefail
          public_base="${CODEGO_RELEASE_PUBLIC_BASE_URL:-https://shu26.cfd}"
          public_base="${public_base%/}"
          expected_version="${GITHUB_REF_NAME#v}"
          node scripts/wait-for-codego-release-version.mjs \
            --release-url "${public_base}/api/desktop/release/latest" \
            --latest-url "${public_base}/api/desktop/release/latest.json" \
            --expected-version "$expected_version" \
            --required-platforms "${{ steps.release-metadata.outputs.required_platforms }}" \
            --required-asset-suffixes "${{ steps.release-metadata.outputs.required_asset_suffixes }}" \
            --timeout-ms "180000" \
            --interval-ms "5000"

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: Code Go Desktop ${{ github.ref_name }}
          prerelease: true
          body: |
            ## Code Go Desktop ${{ github.ref_name }}

            🌐 **Only Official Website / 唯一官方网站 / 唯一の公式サイト**: [shu26.cfd](https://shu26.cfd)

            Canonical desktop download page: [https://shu26.cfd/download](https://shu26.cfd/download)

            The attached artifacts mirror the build outputs used by the self-hosted desktop release channel. The website download page remains the canonical user-facing entry point.

            Deployment mode: `${{ steps.deploy-config.outputs.summary }}`

            ### Attached artifacts

            - macOS: `CodeGo_<version>_universal.dmg`（推荐）/ `CodeGo_<version>_universal.zip` / `CodeGo_<version>_universal.app.tar.gz`
            - Windows: `CodeGo_<version>_x64_en-US.msi` / `CodeGo_<version>_arm64_en-US.msi` / `CodeGo_<version>_*_portable.zip`
            - Linux: `CodeGo_<version>_x64.AppImage` / `.deb` / `.rpm` and ARM64 equivalents
            - Release channel metadata: `codego-desktop-release-manifest.json` and `latest.json`

            ---
            Updater signatures and macOS notarization metadata are included when the corresponding CI signing secrets are configured.
          files: release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
